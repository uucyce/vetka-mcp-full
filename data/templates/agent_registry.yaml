# ── Shared Zones ────────────────────────────────────────────
# Files where multiple agents have partial ownership.
# Protocol: declare scope in task description before touching.
shared_zones:
  - file: "client/src/hooks/useCutHotkeys.ts"
    owners:
      Alpha: "editing actions (JKL, 3-point, mark)"
      Gamma: "panel focus dispatch, scope guard"
    protocol: "Declare scope in task description"

  - file: "client/src/components/cut/DockviewLayout.tsx"
    owners:
      Gamma: "panel registry, layout management"
      Beta: "new panel registrations"
    protocol: "Beta notifies Gamma of new panel names"

  - file: "client/src/store/useCutEditorStore.ts"
    owners:
      Alpha: "timeline fields (currentTime, playhead, marks)"
      Gamma: "UI fields (focusedPanel, viewMode)"
    protocol: "New fields: declare ownership via task"

  - file: "src/api/routes/cut_routes.py"
    owners:
      Beta: "color/*, scopes/*, lut/*, probe/* endpoints"
    protocol: "Consider splitting per-domain route files"

  # MARKER_201.SHARED_ZONES: High-cardinality files touched by many agents — suppress overlap warning
  - file: "photo_parallax_playground/src/App.tsx"
    owners:
      Codex: "all sections"
    protocol: "Declare scope in task description before touching"

  - file: "src/orchestration/task_board.py"
    owners:
      Eta: "harness/infra sections (MARKER_201.*)"
      Zeta: "harness/infra sections (MARKER_200.*)"
    protocol: "Coordinate via task description; don't edit same function"

  - file: "client/package.json"
    owners: {}
    protocol: "Any agent may add dependencies — declare in task"

  - file: "package.json"
    owners: {}
    protocol: "Any agent may add dependencies — declare in task"

