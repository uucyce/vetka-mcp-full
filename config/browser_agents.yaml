# MARKER_BP1.5: Browser Agent Proxy Configuration
# Account credentials for free-tier AI chat services
# Used by: src/services/browser_agent_proxy.py + src/services/browser_manager.py

# ── Global Settings ───────────────────────────────────────────────────
global:
  # Default viewport for all browser instances
  viewport:
    width: 1440
    height: 900
  
  # Human-like timing (seconds)
  timing:
    min_delay: 2.0
    max_delay: 5.0
    page_load_timeout: 30.0
    action_timeout: 15.0
  
  # Rate limiting per account
  rate_limit:
    max_requests_per_hour: 10
    cooldown_after_captcha: 1800  # 30 minutes
  
  # Session persistence
  sessions:
    storage_dir: "data/browser_sessions"
    max_lifetime: 14400  # 4 hours in seconds
    auto_save_interval: 300  # 5 minutes

