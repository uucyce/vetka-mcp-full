  # ── Account Rotation — How to add more profiles ───────────────────
  # Pattern: same `name` (service group), different `profile_dir`.
  # profile_name auto-derives from profile_dir last segment (deepseek_2, etc.)
  # BrowserClient keys by profile_name, so both profiles run in parallel.
  #
  # Setup a new profile: python sherpa.py --setup --service deepseek
  # (opens ALL deepseek_* profiles for manual login, one by one)
  # Then set enabled: true for the new profile.
  # Sherpa rotates between all enabled entries of a service round-robin.

