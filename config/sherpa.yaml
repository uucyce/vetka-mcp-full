  # ── HuggingChat — open models (Llama, Qwen, Mistral, Gemma) ──────
  # probe: textarea confirmed, NEED_LOGIN. Setup: python sherpa.py --setup --service huggingchat
  - name: huggingchat
    url: https://huggingface.co/chat
