[pytest]
# Phase 104 Architecture Merge Test Configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers for Phase 104 tests
markers =
    architecture_merge: Tests for Phase 104 Architecture Merge implementation
    pipeline_loop: Tests for Pipeline Loop (_execute_pipeline_loop method)
    elisya_integration: Tests for ElisyaState preservation and integration
    feature_flag: Tests for VETKA_PIPELINE_ENABLED feature flag
    phase_104: Phase 104 tests
    approval_flow: Tests for Phase 104.4 Approval Flow (VETKA + MYCELIUM modes)
    elision_compression: Tests for ELISION Level 3 compression with vowel skipping
    memory_integration: Tests for Phase 104.6 Memory ELISION Integration
    stream_visibility: Tests for Phase 104.7 Stream Visibility control and Socket.IO integration
    integration: Integration tests
    asyncio: Async/await tests
    phase_115: Phase 115 bug fix verification tests
    phase_116: Phase 116 security hardening tests
    phase_117: Phase 117 provider override and balance tracking tests
    stale: Pre-existing failures — deselected by default, run with --include-stale
    unit: Fast source-parsing tests (no browser, no backend)
    e2e: Full browser E2E tests (needs Playwright + dev server)
    smoke: Quick sanity checks
    tdd_red: Intentionally failing tests (acceptance criteria)
    slow: Tests that take >10s (build, live API, heavy computation)

asyncio_mode = auto
