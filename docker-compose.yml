version: '3.8'

services:
  # Weaviate — Semantic Search + Structured Data
  weaviate:
    image: semitechnologies/weaviate:1.26.1
    ports:
      - "8080:8080"
    volumes:
      - weaviate_data:/var/lib/weaviate
      - ./data/weaviate_backups:/var/lib/weaviate/backups
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'text2vec-transformers'
      DISK_USE_WARNING_PERCENTAGE: 80
      DISK_USE_READONLY_PERCENTAGE: 90
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/meta"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - vetka_network

  # Qdrant — Vector Search + Similarity
  qdrant:
    image: qdrant/qdrant:v1.16.2
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
      - ./data/qdrant_snapshots:/qdrant/snapshots
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-vetka_key_2025}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - vetka_network

  # Ollama — Local LLM + Embeddings
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_MODELS: /root/.ollama/models
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - vetka_network

volumes:
  weaviate_data:
    driver: local
  qdrant_data:
    driver: local
  ollama_data:
    driver: local

networks:
  vetka_network:
    driver: bridge
